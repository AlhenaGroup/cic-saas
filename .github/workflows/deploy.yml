name: Deploy to Vercel (prebuilt)

# Bypass del deploy automatico Vercel-from-git per evitare il bug ricorrente
# del 404 su /api/invoices (build cache esclude la function dal deploy).
# Soluzione: ad ogni push fa lui il build localmente e lo deploya prebuilt.

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build (prebuilt artifact)
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
